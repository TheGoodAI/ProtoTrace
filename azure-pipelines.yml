trigger:
  branches:
    include:
      - main

pool:
  name: ProtoAI-vmss

variables:
  ACR_LOGIN_SERVER: protoai.azurecr.io
  IMAGE_NAME: prototrace
  IMAGE: protoai.azurecr.io/prototrace:latest
  IMAGE_TAG: latest

  CONTAINER_NAME: prototrace
  APP_PORT: 8000

stages:

# ============================================================
# BUILD & PUSH
# ============================================================
- stage: BuildAndPush
  displayName: Build & Push Docker Image

  jobs:
    - job: Build
      displayName: Build and Push

      steps:
        - checkout: self

        - task: Docker@2
          displayName: Build and Push Image
          inputs:
            containerRegistry: ProtoAI
            repository: $(IMAGE_NAME)
            command: buildAndPush
            Dockerfile: Dockerfile
            tags: |
              $(IMAGE_TAG)

# ============================================================
# DEPLOY
# ============================================================
- stage: Deploy
  displayName: Deploy Container
  dependsOn: BuildAndPush
  condition: succeeded()

  jobs:
    - job: Deploy
      displayName: Docker Run on VM

      steps:
        - task: SSH@0
          displayName: Deploy via SSH
          inputs:
            sshEndpoint: prototrace-vm SSH
            runOptions: inline
            inline: |
              set -euo pipefail

              # Azure DevOps variables
              ACR_LOGIN_SERVER="$(ACR_LOGIN_SERVER)"
              IMAGE="$(IMAGE)"
              CONTAINER="$(CONTAINER_NAME)"
              PORT="$(APP_PORT)"

              # Extract registry name from login server
              ACR_NAME="${ACR_LOGIN_SERVER%%.*}"

              echo "========================================"
              echo "Logging into Azure using Managed Identity"
              echo "========================================"
              az login --identity >/dev/null

              echo "========================================"
              echo "Logging into Azure Container Registry"
              echo "========================================"
              az acr login --name "$ACR_NAME"

              echo "========================================"
              echo "Pulling latest image"
              echo "========================================"
              docker pull "$IMAGE"

              echo "========================================"
              echo "Stopping existing container"
              echo "========================================"
              docker stop "$CONTAINER" || true
              docker rm "$CONTAINER" || true

              echo "========================================"
              echo "Starting new container"
              echo "========================================"
              docker run -d \
                --name "$CONTAINER" \
                --restart always \
                -p ${PORT}:${PORT} \
                "$IMAGE"

              echo "========================================"
              echo "Running Containers"
              echo "========================================"
              docker ps

              echo "========================================"
              echo "Deployment Successful"
              echo "========================================"